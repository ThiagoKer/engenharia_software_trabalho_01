<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Gamer Alpha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-body" data-page="admin">
    <nav class="navbar">
        <div class="logo">ADMIN CONTROL</div>
        <div class="nav-links">
            <a href="index.html">VOLTAR AO INICIO</a>
            <a href="login.html" class="btn-logout">SAIR</a>
        </div>
    </nav>

    <main class="container-home">
        <h1 style="color: #ff00ff; text-shadow: 0 0 10px #ff00ff;">PAINEL DE MODERAÇÃO</h1>

        <section class="perfil-card" style="margin-bottom: 30px; background: rgba(0,0,0,0.7); padding: 25px; border-radius: 15px; border: 1px solid #00f5ff;">
            <h2 style="color: #00f5ff;">Gerenciar Categorias</h2>
            
            <form id="admin-category-form" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" name="nome_nova_categoria" placeholder="Nova Categoria..." style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: white;" required>
                <button type="submit" class="btn-new-topic" style="background: #00f5ff; box-shadow: 0 0 10px #00f5ff; border: none; cursor: pointer; padding: 10px 20px;">
                    ADICIONAR
                </button>
            </form>

            <table style="width: 100%; border-collapse: collapse; color: white;">
                <thead>
                    <tr style="border-bottom: 1px solid #333; text-align: left;">
                        <th style="padding: 10px;">Nome</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="admin-categories-body"></tbody>
            </table>
        </section>

        <section class="perfil-card" style="background: rgba(0,0,0,0.7); padding: 25px; border-radius: 15px; border: 1px solid #ff0055;">
            <h2 style="color: #ff0055;">Denúncias e Tópicos</h2>
            <div id="admin-reports"></div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
