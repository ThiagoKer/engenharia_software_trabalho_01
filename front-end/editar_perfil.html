<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Alpha - Editar Perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-body">
    <nav class="navbar">
        <div class="logo">GAMER ALPHA</div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="perfil.html">PERFIL</a>
            <a href="login.html" class="btn-logout">SAIR</a>
        </div>
    </nav>

    <main class="container-home">
        <div class="perfil-card" style="max-width: 600px; margin: 0 auto;">
            <h1 style="color: #ff00ff; text-shadow: 0 0 10px #ff00ff;">EDITAR PERFIL</h1>
            <p>Altere suas informações e salve para atualizar.</p>

            <form id="formEditarPerfil" enctype="multipart/form-data">
                
                <div class="input-group" style="margin-top: 20px;">
                    <label>Trocar Avatar (Imagem)</label>
                    <input type="file" id="foto_perfil" name="avatar" accept="image/*" class="cyber-upload">
                </div>

                <div class="input-group">
                    <label>Nome de Usuário</label>
                    <input type="text" id="nome_usuario" name="username" value="Usuario1" required>
                </div>

                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="email_usuario" name="email" value="usuario1@email.com" required>
                </div>

                <div class="input-group">
                    <label>Nova Senha (deixe vazio para manter a atual)</label>
                    <input type="password" id="nova_senha" name="password" placeholder="********">
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn-new-topic" style="flex: 2; background: #00f5ff; box-shadow: 0 0 10px #00f5ff;">
                        SALVAR ALTERAÇÕES
                    </button>
                    <button type="button" id="btnExcluirConta" class="btn-logout" style="flex: 1; background: #ff0055;">
                        EXCLUIR CONTA
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('formEditarPerfil').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            const username = document.getElementById('nome_usuario').value;
            const email = document.getElementById('email_usuario').value;
            const avatar = document.getElementById('foto_perfil').files[0];

            if (username) formData.append('username', username);
            if (email) formData.append('email', email);
            if (avatar) formData.append('avatar', avatar);

            try {
                const response = await fetch('http://localhost:3000/api/users/me', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Perfil atualizado com sucesso!');
                    window.location.href = 'perfil.html';
                } else {
                    alert(data.message || 'Erro ao atualizar perfil');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao conectar com o servidor');
            }
        });

        document.getElementById('btnExcluirConta').addEventListener('click', async () => {
            if (!confirm('Tem certeza que deseja excluir sua conta? Esta ação não pode ser desfeita!')) return;

            try {
                const response = await fetch('http://localhost:3000/api/users/me', {
                    method: 'DELETE',
                    credentials: 'include'
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Conta excluída com sucesso!');
                    window.location.href = 'login.html';
                } else {
                    alert(data.message || 'Erro ao excluir conta');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao conectar com o servidor');
            }
        });
    </script>
</body>
</html>
