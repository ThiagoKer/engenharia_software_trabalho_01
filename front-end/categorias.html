<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Alpha - Categorias</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-body">
    <nav class="navbar">
        <div class="logo">GAMER ALPHA</div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="perfil.html">PERFIL</a>
            <a href="login.html" class="btn-logout">SAIR</a>
        </div>
    </nav>

    <main class="container-home">
        <h1 style="color: #00f5ff; text-shadow: 0 0 10px #00f5ff; margin-bottom: 30px;">CATEGORIAS</h1>
        
        <div class="grid-categorias" id="categoriasGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
            <!-- Categorias serão carregadas aqui -->
        </div>
    </main>

    <script>
        // Cores para cada categoria
        const categoryColors = {
            'fps': '#00f5ff',
            'rpg': '#ff00ff',
            'moba': '#7000ff',
            'estrategia': '#ffcc00',
            'esports': '#00ff88',
            'hardware': '#ff6600'
        };

        // Carregar categorias da API
        async function loadCategories() {
            try {
                const response = await fetch('http://localhost:3000/api/categories');
                const data = await response.json();
                
                const grid = document.getElementById('categoriasGrid');
                grid.innerHTML = '';
                
                data.categories.forEach(category => {
                    const color = categoryColors[category.slug] || '#00f5ff';
                    const card = document.createElement('a');
                    card.href = `exibir_topico.html?category=${category.slug}`;
                    card.className = 'categoria-card';
                    card.style.cssText = `text-decoration: none; border: 1px solid ${color}; padding: 40px; border-radius: 15px; text-align: center; background: rgba(${hexToRgb(color)}, 0.1); transition: 0.3s; cursor: pointer;`;
                    card.innerHTML = `
                        <h2 style="color: ${color};">${category.name}</h2>
                        <p style="color: #ccc;">${category.description || 'Discussões e posts'}</p>
                    `;
                    
                    // Hover effect
                    card.addEventListener('mouseenter', () => {
                        card.style.transform = 'scale(1.05)';
                        card.style.boxShadow = `0 0 20px ${color}`;
                    });
                    card.addEventListener('mouseleave', () => {
                        card.style.transform = 'scale(1)';
                        card.style.boxShadow = 'none';
                    });
                    
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Erro ao carregar categorias:', error);
                document.getElementById('categoriasGrid').innerHTML = '<p style="color: #ff0055;">Erro ao carregar categorias. Verifique se o servidor está rodando.</p>';
            }
        }

        // Converter hex para rgb
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '0, 245, 255';
        }

        // Carregar ao abrir página
        loadCategories();
    </script>
</body>
</html>
