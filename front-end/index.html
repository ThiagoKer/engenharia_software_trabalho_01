<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Alpha - Início</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-body">
    <nav class="navbar">
        <div class="logo">GAMER ALPHA</div>
        <div class="navegacao-categorias">
            <a href="categorias.html" class="btn-neon-categorias">
                VER TODAS AS CATEGORIAS
            </a>
         </div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="perfil.html">PERFIL</a>
            <a href="admin.html">ADMINISTRADOR</a>
            <a href="login.html" class="btn-logout">SAIR</a>
        </div>
    </nav>

    <main class="container-home">
        <header class="home-header">
            <h1>Tópicos Recentes</h1>
           <a href="criar_topico.html" style="text-decoration: none;">
                <button class="btn-new-topic">+ Criar Tópico</button>
            </a>
        </header>

        <section class="feed" id="topicsFeed">
            <!-- Tópicos serão carregados aqui -->
            <p style="color: #ccc; text-align: center;">Carregando tópicos...</p>
        </section>
    </main>

    <script>
        // Carregar tópicos da API
        async function loadTopics() {
            try {
                const response = await fetch('http://localhost:3000/api/topics?limit=20');
                const data = await response.json();
                
                const feed = document.getElementById('topicsFeed');
                feed.innerHTML = '';
                
                if (!data.topics || data.topics.length === 0) {
                    feed.innerHTML = '<p style="color: #ccc; text-align: center;">Nenhum tópico encontrado. Seja o primeiro a criar um!</p>';
                    return;
                }
                
                data.topics.forEach(topic => {
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.style.cursor = 'pointer';
                    
                    const tagClass = `tag-${topic.slug}`;
                    const categoryColor = getCategoryColor(topic.slug);
                    
                    card.innerHTML = `
                        <div class="post-info">
                            <span class="tag ${tagClass}" style="background: ${categoryColor};">${topic.category}</span>
                            <h3>${escapeHtml(topic.title)}</h3>
                            <p>Postado por: <strong>${escapeHtml(topic.username)}</strong> em ${formatDate(topic.created_at)}</p>
                        </div>
                        <div class="post-stats">
                            <span>❤️ ${topic.likes_count}</span>
                            <span>💬 ${topic.comments_count}</span>
                        </div>
                    `;
                    
                    card.addEventListener('click', () => {
                        window.location.href = `exibir_topico.html?id=${topic.id}`;
                    });
                    
                    feed.appendChild(card);
                });
            } catch (error) {
                console.error('Erro ao carregar tópicos:', error);
                document.getElementById('topicsFeed').innerHTML = '<p style="color: #ff0055; text-align: center;">Erro ao carregar tópicos. Verifique se o servidor está rodando.</p>';
            }
        }

        function getCategoryColor(slug) {
            const colors = {
                'fps': '#00f5ff',
                'rpg': '#ff00ff',
                'moba': '#7000ff',
                'estrategia': '#ffcc00',
                'esports': '#00ff88',
                'hardware': '#ff6600'
            };
            return colors[slug] || '#00f5ff';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR') + ' às ' + date.toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'});
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Carregar tópicos ao abrir página
        loadTopics();
    </script>
</body>
</html>
