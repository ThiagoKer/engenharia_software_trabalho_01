<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Gamer Alpha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card" style="border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff;">
        <h1>CRIAR CONTA</h1>
        <p>Junte-se à nossa comunidade!</p>

        <form id="formCadastro">
            <div class="input-group">
                <label>Nome de Usuário</label>
                <input type="text" id="usuario_cadastro" name="usuario_cadastro" placeholder="Como quer ser chamado?" required>
            </div>

            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email_cadastro" name="email_cadastro" placeholder="seuemail@exemplo.com" required>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="senha_cadastro" name="senha_cadastro" placeholder="Crie uma senha forte" required>
            </div>

            <button type="submit" class="btn-action btn-cadastro" style="background-color: #ff00ff;">CADASTRAR</button>
        </form>

        <div class="footer-links">
            <p>Já tem conta? <a href="login.html" class="link-destaque" style="color: #ff00ff;">Fazer Login</a></p>
        </div>
    </div>

    <script>
        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('usuario_cadastro').value;
            const email = document.getElementById('email_cadastro').value;
            const password = document.getElementById('senha_cadastro').value;

            try {
                const response = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Cadastro realizado com sucesso!');
                    window.location.href = 'index.html';
                } else {
                    alert(data.message || 'Erro ao cadastrar');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao conectar com o servidor');
            }
        });
    </script> 
</body>
</html>
